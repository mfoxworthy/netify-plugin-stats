# Netify per-application statistics processor plugin loader.
# netifyd scans ${path_state_persistent}/plugins.d and this shared default
# dir for plugin loader stanzas. The plugin reads its own settings from UCI
# (/etc/config/netify-stats) via ndUci, so no conf_filename is required.

[netify-plugin-stats]
enable = yes
plugin_library = ${path_plugin_libdir}/netify-plugin-stats.so

