# Netify per-application statistics processor plugin loader.
# netifyd scans ${path_state_persistent}/plugins.d (= /etc/netifyd/plugins.d)
# for loader stanzas. The section name MUST start with "proc-" for netifyd to
# register it as a processor plugin (see ndGlobalConfig::AddPlugin). The plugin
# reads its own settings from UCI (/etc/config/netify-stats) via libuci, so no
# conf_filename is required.

[proc-netify-stats]
enable = yes
plugin_library = ${path_plugin_libdir}/netify-plugin-stats.so

