# netifyd 4.4.7: detection plugins are registered in /etc/netifyd.conf under
# [plugin_detections]. This file is kept for reference but the actual
# registration is done by the package post-install script.
#
# netifyd 5.2.x: netifyd scans ${path_state_persistent}/plugins.d for stanzas.
# Section MUST start with "proc-" for processor plugins.

[proc-netify-stats]
enable = yes
plugin_library = ${path_plugin_libdir}/netify-plugin-stats.so

